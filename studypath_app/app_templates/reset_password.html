<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyPath AI - Reset Password</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3713ec",
            "background-light": "#f6f6f8",
            "background-dark": "#131022",
          },
          fontFamily: { "display": ["Lexend"], "sans": ["Lexend", "sans-serif"] },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
        },
      },
    }
  </script>

  <style>
    body { font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 100dvh; }
    .input-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">
  <main class="w-full max-w-[430px] min-h-screen bg-white dark:bg-background-dark relative flex flex-col px-8 pt-12 pb-10 overflow-hidden">
    
    <header class="flex items-center mb-10">
      <a href="{{ url_for('login') }}" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/10 text-primary transition-colors">
        <span class="material-icons">chevron_left</span>
      </a>
    </header>

    <section class="mb-10">
      <h1 class="text-3xl font-semibold text-gray-900 dark:text-white mb-3">Reset Password</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed">
        Password change ho raha hai! Make sure it's something secure.
      </p>
    </section>

    <form class="flex-grow space-y-6" action="{{ url_for('login') }}" method="GET">
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300 ml-1">New Password</label>
        <div class="relative group">
          <input id="new-password" type="password" required class="w-full h-14 pl-5 pr-12 bg-white dark:bg-primary/5 border border-gray-100 dark:border-gray-800 rounded-[12px] dark:text-white focus:border-primary focus:ring-primary/20 input-shadow transition-all" placeholder="••••••••"/>
          <button type="button" onclick="togglePass('new-password', 'eye-1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
            <span id="eye-1" class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300 ml-1">Confirm New Password</label>
        <div class="relative group">
          <input id="confirm-password" type="password" required class="w-full h-14 pl-5 pr-12 bg-white dark:bg-primary/5 border border-gray-100 dark:border-gray-800 rounded-[12px] dark:text-white focus:border-primary focus:ring-primary/20 input-shadow transition-all" placeholder="••••••••"/>
          <button type="button" onclick="togglePass('confirm-password', 'eye-2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
            <span id="eye-2" class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <div class="pt-4">
        <button type="submit" class="w-full py-4 bg-primary text-white font-semibold rounded-full shadow-lg shadow-primary/25 active:scale-[0.98] transition-all">
          Update Password
        </button>
      </div>
    </form>

    <footer class="mt-auto pt-6 flex flex-col items-center">
      <div class="mx-auto w-32 h-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
    </footer>
  </main>

  <script>
    function togglePass(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerText = 'visibility_off';
      } else {
        input.type = 'password';
        icon.innerText = 'visibility';
      }
    }
  </script>

  <button class="fixed bottom-4 right-4 w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center shadow-xl z-50" onclick="document.documentElement.classList.toggle('dark')">
    <span class="material-icons">dark_mode</span>
  </button>
</body>
</html>
