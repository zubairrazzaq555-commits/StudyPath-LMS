<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Create Account | StudyPath AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        /* Smooth transition for hidden fields */
        .hidden-field { display: none; }
    </style>
</head>
<body class="bg-[#f6f6f8] dark:bg-[#101022] text-slate-900 dark:text-white min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-md lg:max-w-2xl bg-white dark:bg-slate-800 rounded-2xl lg:rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 md:p-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-[#3713ec]/10 rounded-2xl mb-4">
                <span class="material-icons text-[#3713ec] text-3xl">person_add</span>
            </div>
            <h1 class="text-3xl font-bold text-[#3713ec]">Join StudyPath AI</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Apni information enter karein</p>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-2">I am a:</label>
            <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="setRole('student')" id="btn-student" class="py-3 rounded-xl border-2 border-[#3713ec] bg-[#3713ec] text-white font-bold transition-all">Student</button>
                <button type="button" onclick="setRole('teacher')" id="btn-teacher" class="py-3 rounded-xl border-2 border-slate-100 dark:border-slate-700 text-slate-500 font-bold transition-all">Teacher</button>
            </div>
        </div>

        <form action="{{ url_for('signup') }}" method="POST" class="space-y-4" id="signupForm">
            <input type="hidden" name="role" id="userRole" value="student">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Full Name</label>
                    <input type="text" name="full_name" required placeholder="Ali Ahmed" 
                        class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none transition-all dark:text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Email Address</label>
                    <input type="email" name="email" required placeholder="ali@example.com" 
                        class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none transition-all dark:text-white">
                </div>
            </div>

            <div id="student-fields" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Roll Number</label>
                        <input type="text" name="roll_number" placeholder="12345" 
                            class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none transition-all dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Grade</label>
                        <select name="grade" class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none appearance-none dark:text-white">
                            <option value="11">11th Class</option>
                            <option value="12">12th Class</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">College Name</label>
                    <input type="text" name="college" placeholder="Punjab College / Government College" 
                        class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none transition-all dark:text-white">
                </div>
            </div>

            <div>
                <label id="group-label" class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Study Group / Department</label>
                <select name="group" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none appearance-none dark:text-white">
                    <option value="">Select Option</option>
                    <option value="Pre-Engineering">Pre-Engineering</option>
                    <option value="Pre-Medical">Pre-Medical</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Commerce">Commerce</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase ml-4 mb-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••" 
                    class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-none focus:ring-2 focus:ring-[#3713ec] outline-none transition-all dark:text-white">
            </div>

            <button type="submit" class="w-full bg-[#3713ec] text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:shadow-lg hover:shadow-blue-300 active:scale-[0.98] transition-all mt-6 text-lg">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-8">
            Already have an account? <a href="{{ url_for('login') }}" class="text-[#3713ec] font-bold hover:opacity-80">Login</a>
        </p>
    </div>

    <script>
        function setRole(role) {
            document.getElementById('userRole').value = role;
            const studentFields = document.getElementById('student-fields');
            const btnStudent = document.getElementById('btn-student');
            const btnTeacher = document.getElementById('btn-teacher');

            if (role === 'teacher') {
                studentFields.classList.add('hidden-field');
                btnTeacher.classList.add('bg-[#3713ec]', 'text-white');
                btnTeacher.classList.remove('text-slate-500');
                btnStudent.classList.remove('bg-[#3713ec]', 'text-white');
                btnStudent.classList.add('text-slate-500');
            } else {
                studentFields.classList.remove('hidden-field');
                btnStudent.classList.add('bg-[#3713ec]', 'text-white');
                btnStudent.classList.remove('text-slate-500');
                btnTeacher.classList.remove('bg-[#3713ec]', 'text-white');
                btnTeacher.classList.add('text-slate-500');
            }
        }
    </script>
</body>
</html>
