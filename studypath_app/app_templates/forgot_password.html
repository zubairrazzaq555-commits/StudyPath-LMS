<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyPath AI - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#3713ec",
                "background-light": "#f6f6f8",
                "background-dark": "#131022",
                "neutral-light": "#f3f4f6",
              },
              fontFamily: {
                "display": ["Lexend"]
              },
              borderRadius: {
                "DEFAULT": "0.75rem",
                "lg": "1rem", 
                "xl": "1.5rem", 
                "full": "9999px"
              },
            },
          },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Lexend', sans-serif;
                -webkit-tap-highlight-color: transparent;
            }
        }
        .soft-shadow {
            box-shadow: 0 4px 20px -2px rgba(55, 19, 236, 0.05);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">

<main class="w-full max-w-[430px] min-h-screen bg-white dark:bg-background-dark relative flex flex-col px-8 pt-12 pb-10 overflow-y-auto">
    
    <header class="flex items-center mb-10">
        <a href="/login" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-primary/10 text-gray-800 dark:text-primary transition-colors hover:bg-gray-200">
            <span class="material-icons">chevron_left</span>
        </a>
    </header>

    <section class="mb-10">
        <h1 class="text-3xl font-semibold text-gray-900 dark:text-white mb-4">Forgot Password?</h1>
        <p class="text-gray-500 dark:text-gray-400 text-[15px] leading-relaxed">
            Don't worry! Enter your registered email to receive a secure OTP for password reset.
        </p>
    </section>

    <form action="{{ url_for('verify_otp') }}" class="flex-grow space-y-6">
        <div class="space-y-2">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300 ml-1">Email Address</label>
            <div class="relative">
                <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">mail_outline</span>
                <input required class="w-full pl-12 pr-4 py-4 rounded-[12px] bg-white dark:bg-primary/5 border border-gray-100 dark:border-transparent soft-shadow focus:ring-2 focus:ring-primary text-gray-800 dark:text-white placeholder:text-gray-400 transition-all" placeholder="example@email.com" type="email"/>
            </div>
        </div>

        <button type="submit" class="w-full py-4 bg-primary text-white font-semibold rounded-[12px] shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
            Send OTP
        </button>
    </form>

    <div class="mt-8 p-4 bg-emerald-50 dark:bg-emerald-900/10 rounded-xl flex gap-3 items-center border border-emerald-100 dark:border-emerald-800/30">
        <span class="material-icons text-emerald-500">verified_user</span>
        <p class="text-[11px] text-emerald-700 dark:text-emerald-400 leading-tight">
            Your security is our priority. We will never ask for your password via email or SMS.
        </p>
    </div>

    <footer class="mt-auto pt-8 flex flex-col items-center gap-6">
        <p class="text-sm text-gray-500 dark:text-gray-400">
            Remember your password? 
            <a class="text-primary font-semibold ml-1" href="{{ url_for('login') }}">Log In</a>
        </p>
        <div class="w-32 h-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
    </footer>
</main>

<button class="fixed bottom-4 right-4 w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center shadow-xl z-50" onclick="document.documentElement.classList.toggle('dark')">
    <span class="material-icons">dark_mode</span>
</button>

</body></html>
