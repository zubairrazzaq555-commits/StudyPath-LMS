<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyPath AI - Verify OTP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#3713ec",
                "background-light": "#f6f6f8",
                "background-dark": "#131022",
                "neutral-light": "#f3f4f6",
              },
              fontFamily: { "display": ["Lexend"], "sans": ["Lexend", "sans-serif"] },
              borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px", "otp": "12px" },
            },
          },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body { font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; }
        }
        .otp-input:focus { border-color: #3713ec; box-shadow: 0 0 0 1px #3713ec; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center">

<main class="w-full max-w-[430px] min-h-screen bg-white dark:bg-background-dark relative flex flex-col px-8 pt-12 pb-10 overflow-hidden">
    <header class="flex items-center mb-10">
        <a href="{{ url_for('forgot_password') }}" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/10 text-primary transition-colors">
            <span class="material-icons">chevron_left</span>
        </a>
    </header>

    <section class="mb-12">
        <h1 class="text-3xl font-semibold text-gray-900 dark:text-white mb-2">Verify OTP</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm">Enter the 4-digit code sent to your email.</p>
    </section>

    <div class="flex-grow flex flex-col">
        <form id="otp-form" class="space-y-10" action="{{ url_for('reset_password') }}" method="GET">
            <div class="flex justify-between gap-4 px-2">
                <input class="otp-field w-16 h-16 text-center text-2xl font-bold bg-neutral-light dark:bg-primary/5 border-2 border-transparent rounded-[12px] dark:text-white focus:outline-none transition-all" maxlength="1" placeholder="-" type="text" pattern="\d*"/>
                <input class="otp-field w-16 h-16 text-center text-2xl font-bold bg-neutral-light dark:bg-primary/5 border-2 border-transparent rounded-[12px] dark:text-white focus:outline-none transition-all" maxlength="1" placeholder="-" type="text" pattern="\d*"/>
                <input class="otp-field w-16 h-16 text-center text-2xl font-bold bg-neutral-light dark:bg-primary/5 border-2 border-transparent rounded-[12px] dark:text-white focus:outline-none transition-all" maxlength="1" placeholder="-" type="text" pattern="\d*"/>
                <input class="otp-field w-16 h-16 text-center text-2xl font-bold bg-neutral-light dark:bg-primary/5 border-2 border-transparent rounded-[12px] dark:text-white focus:outline-none transition-all" maxlength="1" placeholder="-" type="text" pattern="\d*"/>
            </div>
            
            <div class="text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Didn't receive the code? 
                    <button type="button" class="text-primary font-semibold hover:underline ml-1">Resend Code</button>
                </p>
            </div>

            <footer class="mt-auto pt-10 flex flex-col items-center">
                <button type="submit" class="w-full py-4 bg-primary text-white font-semibold rounded-full shadow-lg shadow-primary/25 active:scale-[0.98] transition-all">
                    Verify & Proceed
                </button>
            </footer>
        </form>
    </div>

    <div class="mx-auto w-32 h-1 bg-gray-200 dark:bg-gray-800 rounded-full mt-10"></div>
</main>

<script>
    // Auto-focus next input logic
    const fields = document.querySelectorAll('.otp-field');
    fields.forEach((field, index) => {
        field.addEventListener('input', (e) => {
            if (e.target.value && index < fields.length - 1) {
                fields[index + 1].focus();
            }
        });
        field.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                fields[index - 1].focus();
            }
        });
    });
</script>

<button class="fixed bottom-4 right-4 w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center shadow-xl z-50" onclick="document.documentElement.classList.toggle('dark')">
    <span class="material-icons">dark_mode</span>
</button>

</body></html>
